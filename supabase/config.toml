[auth]
site_url = "https://dataprimetech.com"
additional_redirect_urls = [
  "https://dataprimetech.com/reset-password",
  "https://dataprimetech.com/login",
  "http://localhost:3000/reset-password"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
